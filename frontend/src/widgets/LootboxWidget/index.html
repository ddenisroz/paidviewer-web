<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lootbox Widget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lootbox-container" class="lootbox-container">
        <div id="lootbox-animation" class="lootbox-animation">
            <img id="lootbox-image" src="" alt="Лутбокс" class="lootbox-image">
            <div id="lootbox-glow" class="lootbox-glow"></div>
            <div id="lootbox-particles" class="lootbox-particles"></div>
        </div>
        <div id="lootbox-info" class="lootbox-info">
            <div id="username" class="username"></div>
            <div id="reward" class="reward"></div>
            <div id="rarity" class="rarity"></div>
        </div>
    </div>
    
    <audio id="sound-effect" preload="auto"></audio>
    <script src="../shared/websocket.js"></script>
    <script src="../shared/config-manager.js"></script>
    <script src="script.js"></script>
</body>
</html>
